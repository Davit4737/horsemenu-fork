name: Build DLL

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-latest
    name: Build HorseMenu.dll

    steps:
      - uses: actions/checkout@v4

      - name: Check CMake version
        run: cmake --version

      - name: Configure
        run: cmake -S . -B build -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build Release
        run: cmake --build build --config Release

      - name: Check the DLL actually got built
        run: if (-Not (Test-Path -Path "build/Release/HorseMenu.dll")) { throw "DLL missing" }

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: HorseMenu-dll
          path: build/Release/HorseMenu.dll
